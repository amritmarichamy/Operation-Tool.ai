<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSA Pipeline | Terra Tern Operations Tool</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/terratern-logo.png') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <style>
        /* Add OTP Modal Styles */
        .otp-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .otp-card {
            background: #0f172a;
            padding: 40px;
            border: 2px solid #2563eb;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .otp-card h3 {
            color: #fff;
            margin-bottom: 20px;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .otp-input-group input {
            width: 45px;
            height: 55px;
            background: transparent;
            border: 2px solid #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            color: #fff;
            font-weight: 700;
            transition: 0.3s;
        }

        .otp-input-group input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        .resend-link {
            color: #2563eb;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            display: none;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        <!-- Login Panel -->
        <div class="credentials-panel signin">
            <div class="text-center mb-4 slide-element">
                <img src="{{ url_for('static', filename='img/terratern-icon.png') }}" alt="TerraTern"
                    class="tt-login-brand-logo" width="200" height="52" decoding="async" />
            </div>
            <h2 class="slide-element">Login</h2>
            <form id="loginForm">
                <div class="field-wrapper slide-element">
                    <input type="text" id="loginUsername" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="loginPassword" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Login</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> <a href="#" class="register-trigger">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <!-- Register Panel -->
        <div class="credentials-panel signup">
            <div class="text-center mb-4 slide-element">
                <img src="{{ url_for('static', filename='img/terratern-icon.png') }}" alt="TerraTern"
                    class="tt-login-brand-logo" width="200" height="52" decoding="async" />
            </div>
            <h2 class="slide-element">Register</h2>
            <form id="registerForm">
                <div class="field-wrapper slide-element">
                    <input type="text" id="regUsername" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" id="regEmail" required>
                    <label>Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="regPassword" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Register</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> <a href="#" class="login-trigger">Sign In</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME!</h2>
        </div>
    </div>

    <!-- OTP Modal -->
    <div class="otp-overlay" id="otpOverlay">
        <div class="otp-card">
            <h3>Enter OTP</h3>
            <p style="color: #ccc; margin-bottom: 20px; font-size: 14px;">We've sent a code to your email.</p>
            <div class="otp-input-group">
                <input type="text" maxlength="1" oninput="this.nextElementSibling?.focus()">
                <input type="text" maxlength="1" oninput="this.nextElementSibling?.focus()">
                <input type="text" maxlength="1" oninput="this.nextElementSibling?.focus()">
                <input type="text" maxlength="1" oninput="this.nextElementSibling?.focus()">
                <input type="text" maxlength="1" oninput="this.nextElementSibling?.focus()">
                <input type="text" maxlength="1" id="lastOtpDigit">
            </div>
            <button class="submit-button" id="verifyOtpBtn">Verify & Login</button>
            <span class="resend-link" onclick="window.location.reload()">Back to Login</span>
        </div>
    </div>

    <div id="toast"></div>


    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
